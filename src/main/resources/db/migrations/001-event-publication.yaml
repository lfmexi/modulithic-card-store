databaseChangeLog:
  - changeSet:
      id: "001-1"
      author: liquibase
      changes:
        - createTable:
            tableName: event_publication
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: listener_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: serialized_event
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: publication_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: completion_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: status
                  type: TEXT
              - column:
                  name: completion_attempts
                  type: INT
              - column:
                  name: last_resubmission_date
                  type: TIMESTAMP WITH TIME ZONE

  - changeSet:
      id: "001-2"
      author: liquibase
      changes:
        - sql:
            sql: >
              CREATE INDEX IF NOT EXISTS event_publication_serialized_event_hash_idx
              ON event_publication USING hash(serialized_event)

  - changeSet:
      id: "001-3"
      author: liquibase
      changes:
        - createIndex:
            indexName: event_publication_by_completion_date_idx
            tableName: event_publication
            columns:
              - column:
                  name: completion_date

  - changeSet:
      id: "001-4"
      author: liquibase
      changes:
        - createTable:
            tableName: event_publication_archive
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: listener_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: serialized_event
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: publication_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: completion_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: status
                  type: TEXT
              - column:
                  name: completion_attempts
                  type: INT
              - column:
                  name: last_resubmission_date
                  type: TIMESTAMP WITH TIME ZONE

  - changeSet:
      id: "001-5"
      author: liquibase
      changes:
        - sql:
            sql: >
              CREATE INDEX IF NOT EXISTS event_publication_archive_serialized_event_hash_idx
              ON event_publication_archive USING hash(serialized_event)

  - changeSet:
      id: "001-6"
      author: liquibase
      changes:
        - createIndex:
            indexName: event_publication_archive_by_completion_date_idx
            tableName: event_publication_archive
            columns:
              - column:
                  name: completion_date
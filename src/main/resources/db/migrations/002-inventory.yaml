databaseChangeLog:
  - changeSet:
      id: "002-1"
      author: liquibase
      changes:
        - createTable:
            tableName: inventory_product
            columns:
              - column:
                  name: shop_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: state
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
  - changeSet:
      id: "002-2"
      author: liquibase
      changes:
        - createTable:
            tableName: inventory_reservation
            columns:
              - column:
                  name: shop_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ordered_quantity
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: confirmed_quantity
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

databaseChangeLog:
  - changeSet:
      id: "003-1"
      author: liquibase
      changes:
        - createTable:
            tableName: order_product
            columns:
              - column:
                  name: shop_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: state
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

  - changeSet:
      id: "003-2"
      author: liquibase
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: shop_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: ordered_quantity
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: confirmed_quantity
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: ordered_price
                  type: DECIMAL(23,10)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: last_confirmed_price
                  type: DECIMAL(23,10)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false